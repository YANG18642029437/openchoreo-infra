---
- name: Set the inventory hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Set the system timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Install common host packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable the QEMU guest agent service
  ansible.builtin.systemd_service:
    name: qemu-guest-agent
    enabled: true
  when: not ansible_check_mode
  notify: Restart QEMU guest agent when its channel is available

- name: Disable active swap
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb | int > 0
  changed_when: true

- name: Remove swap entries from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(?!#)(.*\s+swap\s+.*)$'
    replace: '# \1'

- name: Load Kubernetes kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ common_kernel_modules }}"

- name: Persist Kubernetes kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    content: "{{ common_kernel_modules | join('\n') }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Persist Kubernetes sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop: "{{ common_sysctls }}"
