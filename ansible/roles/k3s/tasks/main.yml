---
- name: Create the K3s configuration directory
  ansible.builtin.file:
    path: "{{ k3s_config_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Write the K3s server configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_config_directory }}/config.yaml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart K3s

- name: Download the pinned K3s installer
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: "{{ k3s_install_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Require the verified controller-side K3s binary
  ansible.builtin.assert:
    that:
      - k3s_binary_cache_path | length > 0
    fail_msg: Set K3S_BINARY_FILE to the verified K3s binary cache path.

- name: Require the verified controller-side K3s air-gap archive
  ansible.builtin.assert:
    that:
      - k3s_airgap_cache_path | length > 0
    fail_msg: Set K3S_AIRGAP_FILE to the verified K3s air-gap archive path.

- name: Distribute the verified K3s binary
  ansible.builtin.copy:
    src: "{{ k3s_binary_cache_path }}"
    dest: /usr/local/bin/k3s
    owner: root
    group: root
    mode: "0755"

- name: Create the K3s air-gap image directory
  ansible.builtin.file:
    path: "{{ k3s_airgap_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Distribute the verified K3s air-gap images
  ansible.builtin.copy:
    src: "{{ k3s_airgap_cache_path }}"
    dest: "{{ k3s_airgap_directory }}/k3s-airgap-images-amd64.tar.zst"
    owner: root
    group: root
    mode: "0600"
  notify: Restart K3s

- name: Distribute additional offline image archives
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ k3s_airgap_directory }}/{{ item | basename }}"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ k3s_extra_image_archives }}"
  notify: Restart K3s

- name: Enable conditional air-gap image imports
  ansible.builtin.file:
    path: "{{ k3s_airgap_directory }}/.cache.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Check whether the K3s service is installed
  ansible.builtin.stat:
    path: /etc/systemd/system/k3s.service
  register: k3s_service_unit

- name: Install the pinned K3s server
  ansible.builtin.command: "{{ k3s_install_script_path }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: server
    INSTALL_K3S_SKIP_DOWNLOAD: "true"
  when: not k3s_service_unit.stat.exists
  changed_when: true
  no_log: true

- name: Enable and start K3s
  ansible.builtin.systemd_service:
    name: k3s
    enabled: true
    state: started

- name: Flush K3s restart handlers
  ansible.builtin.meta: flush_handlers

- name: Wait for the local K3s API
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ k3s_api_port }}"
    timeout: 300
