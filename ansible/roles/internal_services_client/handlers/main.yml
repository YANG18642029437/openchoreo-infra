---
- name: Restart systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted

- name: Update root certificates
  ansible.builtin.command: update-ca-certificates
  changed_when: true

- name: Restart K3s
  ansible.builtin.systemd_service:
    name: k3s
    state: restarted
